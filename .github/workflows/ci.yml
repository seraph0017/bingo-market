# Bingo Market CI Pipeline
name: CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'code/backend/**'
      - 'code/frontend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'code/backend/**'
      - 'code/frontend/**'
      - '.github/workflows/**'

env:
  # Backend
  PYTHON_VERSION: '3.11'
  # Frontend
  NODE_VERSION: '20'

jobs:
  # Backend Tests and Linting
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bingo_test
          POSTGRES_PASSWORD: bingo_test
          POSTGRES_DB: bingo_market_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black ruff mypy pytest-cov

      - name: Lint with black
        run: black --check .

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports

      - name: Run tests with pytest
        env:
          DATABASE_URL: postgresql+asyncpg://bingo_test:bingo_test@localhost:5432/bingo_market_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          ENVIRONMENT: test
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./code/backend/coverage.xml
          flags: backend
          name: backend-coverage

  # Frontend Tests and Linting
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: code/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run type-check --if-present

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test --if-present

  # Docker Build
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./code/backend
          file: ./code/backend/Dockerfile
          push: false
          tags: bingo-market/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./code/frontend
          file: ./code/frontend/Dockerfile
          push: false
          tags: bingo-market/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
